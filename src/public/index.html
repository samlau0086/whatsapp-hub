<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WhatsApp Actor Hub</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <div class="brand-mark">WA</div>
        <div>
          <h1>WhatsApp Actor Hub</h1>
          <p id="connection-label">Disconnected</p>
        </div>
      </div>

      <form id="token-form" class="token-form">
        <input id="token-input" type="password" placeholder="Hub API token" autocomplete="current-password" />
        <button type="submit">Connect</button>
      </form>
    </header>

    <main class="dashboard">
      <section class="metric-strip" aria-label="Overview">
        <article class="metric-card">
          <span>Online clients</span>
          <strong id="stat-online">0</strong>
        </article>
        <article class="metric-card">
          <span>Total clients</span>
          <strong id="stat-clients">0</strong>
        </article>
        <article class="metric-card">
          <span>Running tasks</span>
          <strong id="stat-running">0</strong>
        </article>
        <article class="metric-card">
          <span>Messages cached</span>
          <strong id="stat-messages">0</strong>
        </article>
      </section>

      <section class="workspace">
        <aside class="side-panel">
          <div class="section-head">
            <div>
              <h2>Clients</h2>
              <p id="client-summary">0 online</p>
            </div>
            <button id="refresh" class="ghost-button" type="button">Refresh</button>
          </div>

          <div class="filter-row">
            <button id="filter-all" class="filter-button active" type="button">All</button>
            <button id="filter-online" class="filter-button" type="button">Online</button>
            <button id="filter-offline" class="filter-button" type="button">Offline</button>
          </div>

          <div id="clients" class="client-list"></div>
        </aside>

        <section class="main-panel">
          <div class="compose-panel">
            <div class="section-head">
              <div>
                <h2>Send Message</h2>
                <p id="dispatch-hint">Random online client</p>
              </div>
              <span id="selected-client-pill" class="soft-pill">No client selected</span>
            </div>

            <form id="send-form" class="send-form">
              <label>
                <span>Client</span>
                <select id="send-client">
                  <option value="">Random online client</option>
                </select>
              </label>
              <label>
                <span>Phone</span>
                <input id="send-to" placeholder="15551234567" />
              </label>
              <label class="message-input">
                <span>Message</span>
                <textarea id="send-body" placeholder="Type message body"></textarea>
              </label>
              <button type="submit">Dispatch task</button>
            </form>
          </div>

          <div class="content-grid">
            <section class="panel-card">
              <div class="section-head">
                <div>
                  <h2>Task Timeline</h2>
                  <p id="task-summary">Latest 50 tasks</p>
                </div>
              </div>
              <div id="tasks" class="timeline"></div>
            </section>

            <section class="panel-card">
              <div class="section-head">
                <div>
                  <h2>Message Stream</h2>
                  <p id="message-summary">Latest 50 messages</p>
                </div>
              </div>
              <div id="messages" class="message-stream"></div>
            </section>
          </div>

          <section class="panel-card">
            <div class="section-head">
              <div>
                <h2>API Requests</h2>
                <p id="request-summary">Latest 50 API calls</p>
              </div>
            </div>
            <div id="requests" class="request-list"></div>
          </section>
        </section>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
