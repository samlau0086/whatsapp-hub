name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH || '/opt/whatsapp-hub' }}
      VPS_ENV_FILE: ${{ secrets.VPS_ENV_FILE }}
      VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

    steps:
      - name: Check required secrets
        run: |
          set -eu
          test -n "$VPS_HOST" || (echo "Missing secret: VPS_HOST" && exit 1)
          test -n "$VPS_USER" || (echo "Missing secret: VPS_USER" && exit 1)
          test -n "$VPS_SSH_PRIVATE_KEY" || (echo "Missing secret: VPS_SSH_PRIVATE_KEY" && exit 1)

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build deployment archive
        run: |
          set -eu
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='data' \
            --exclude='.env' \
            --exclude='.wwebjs_auth' \
            --exclude='.wwebjs_cache' \
            -czf "$RUNNER_TEMP/whatsapp-hub.tgz" .

      - name: Configure SSH
        run: |
          set -eu
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Prepare VPS directory
        run: |
          set -eu
          ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "mkdir -p '$VPS_DEPLOY_PATH'"

      - name: Upload files
        run: |
          set -eu
          scp -i ~/.ssh/deploy_key -P "$VPS_PORT" "$RUNNER_TEMP/whatsapp-hub.tgz" "$VPS_USER@$VPS_HOST:$VPS_DEPLOY_PATH/.deploy-whatsapp-hub.tgz"
          if [ -n "$VPS_ENV_FILE" ]; then
            printf '%s\n' "$VPS_ENV_FILE" > .env.production
            scp -i ~/.ssh/deploy_key -P "$VPS_PORT" .env.production "$VPS_USER@$VPS_HOST:$VPS_DEPLOY_PATH/hub.env"
          fi

      - name: Deploy with Docker Compose
        run: |
          set -eu
          ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "DEPLOY_PATH='$VPS_DEPLOY_PATH' bash -s" <<'REMOTE'
          set -Eeuo pipefail
          cd "$DEPLOY_PATH"
          if [ -z "$DEPLOY_PATH" ] || [ "$DEPLOY_PATH" = "/" ]; then
            echo "Refusing to deploy to an empty path or /"
            exit 1
          fi
          find "$DEPLOY_PATH" -mindepth 1 -maxdepth 1 ! -name 'hub.env' ! -name 'data' ! -name '.deploy-whatsapp-hub.tgz' -exec rm -rf {} +
          tar -xzf .deploy-whatsapp-hub.tgz
          rm -f .deploy-whatsapp-hub.tgz

          if [ ! -f hub.env ]; then
            echo "Missing $DEPLOY_PATH/hub.env. Add GitHub secret VPS_ENV_FILE or create hub.env on the VPS."
            exit 1
          fi

          {
            grep -E '^(HOST_BIND_ADDRESS|HOST_PORT|PORT)=' hub.env || true
          } > compose.env

          if docker compose version >/dev/null 2>&1; then
            docker compose --env-file compose.env up -d --build --remove-orphans
          else
            docker-compose --env-file compose.env up -d --build --remove-orphans
          fi

          docker image prune -f
          REMOTE
